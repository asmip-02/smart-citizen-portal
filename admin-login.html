<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Portal – Admin Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef0e8 0%, #f5ede6 100%);
      padding: 2rem;
    }
    .login-box {
      background: var(--white);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo .brand-icon {
      width: 56px; height: 56px;
      font-size: 1.4rem;
      margin: 0 auto 0.8rem;
    }
    .login-logo h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: .3rem;
    }
    .login-logo p { color: var(--text-muted); font-size: .9rem; }
    .login-error {
      background: #fde8e8;
      color: #c0392b;
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .88rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: .5rem;
    }
    .login-error.show { display: flex; }
    .eye-btn {
      position: absolute;
      right: .9rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--text-muted);
      font-size: .95rem;
    }
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 2.8rem; }
    
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="brand-icon"><i class="fa-solid fa-leaf"></i></div>
        <h2>Admin Login</h2>
        <p>Smart Complaint Portal</p>
      </div>

      <div class="login-error" id="loginError">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorMsg">Invalid username or password.</span>
      </div>

      <div class="form-group">
        <label for="adminUser">Username <span class="req">*</span></label>
        <input type="text" id="adminUser" class="form-input" placeholder="Enter admin username" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>

      <div class="form-group">
        <label for="adminPass">Password <span class="req">*</span></label>
        <div class="input-wrap">
          <input type="password" id="adminPass" class="form-input" placeholder="Enter password" onkeydown="if(event.key==='Enter') doLogin()"/>
          <button class="eye-btn" onclick="togglePass()" type="button" id="eyeBtn">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button class="btn-primary full-width" onclick="doLogin()" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>

       
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('sp_admin') === 'true') {
      window.location.href = 'admin-dashboard.html';
    }

    function doLogin() {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value.trim();
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginError');

      // Simple hardcoded admin credentials (for demo)
      // In real AWS version, this would call an API
      if (user === 'admin' && pass === 'admin123') {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
        localStorage.setItem('sp_admin', 'true');
        setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
      } else {
        err.classList.add('show');
        document.getElementById('errorMsg').textContent = 'Invalid username or password.';
        document.getElementById('adminPass').value = '';
      }
    }

    function togglePass() {
      const input = document.getElementById('adminPass');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }
  </script>
</body>
</html>
